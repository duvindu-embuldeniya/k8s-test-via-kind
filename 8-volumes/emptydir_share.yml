apiVersion: v1
kind: Pod
metadata:
  name: emptydir-share-demo  # Name of the Pod
spec:
  volumes:
    - name: shared-storage   # Shared volume name
      emptyDir: {}           # Temporary storage (deleted when Pod is deleted)
  containers:
    - name: writer           # First container (writes data)
      image: busybox
      command: ["sh", "-c", "sleep 3600"]  # Keep container running for demo purposes
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
      volumeMounts:
        - name: shared-storage
          mountPath: /data   # Writer writes data here
    - name: reader           # Second container (reads data)
      image: busybox
      command: ["sh", "-c", "sleep 3600"]  # Keep container running
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
      volumeMounts:
        - name: shared-storage  # Mount the same shared volume
          mountPath: /data      # Reader reads data from here