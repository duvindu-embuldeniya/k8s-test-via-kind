service.yaml///////////////
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  labels:
    app: nginx
spec:
  type: NodePort
  selector:
    app: nginx   # selects BOTH v1 and v2 pods
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30007   # optional (can remove if not needed)



nginx-v1.yaml (Stable Version)/////////////
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-v1
  labels:
    app: nginx
    version: v1
spec:
  replicas: 4   # stable gets most traffic
  selector:
    matchLabels:
      app: nginx
      version: v1
  template:
    metadata:
      labels:
        app: nginx
        version: v1
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80


nginx-v2.yaml (Canary Version)/////////////////
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-v2
  labels:
    app: nginx
    version: v2
spec:
  replicas: 1   # small traffic (canary)
  selector:
    matchLabels:
      app: nginx
      version: v2
  template:
    metadata:
      labels:
        app: nginx
        version: v2
    spec:
      containers:
        - name: nginx
          image: nginx:1.26   # new version
          ports:
            - containerPort: 80



Service → routes using app: nginx
Pods:
v1 = 4 pods
v2 = 1 pod
Traffic flow -> 80% v1 / 20% v2